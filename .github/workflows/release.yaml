name: "release"
on:
  push:
    tags: ['v*']
    branches: [ master ]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/setup-go@be3c94b385c4f180051c996d336f57a34c397495 # v3.6.1
        with:
          go-version: 1.25.x
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Release
        if: github.event.ref != 'refs/heads/master'
        uses: goreleaser/goreleaser-action@6e37040623d14330555c7be1603a9182cf92d32a # v1.5.1
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        if: github.event.ref == 'refs/heads/master'
        uses: goreleaser/goreleaser-action@6e37040623d14330555c7be1603a9182cf92d32a # v1.5.1
        with:
          version: latest
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Package
        if: github.event.ref == 'refs/heads/master'
        run: |
          tar -zcf go-tpc_latest_linux_amd64.tar.gz  -C dist/go-tpc_linux_amd64_v1 go-tpc
          tar -zcf go-tpc_latest_linux_arm64.tar.gz  -C dist/go-tpc_linux_arm64_v8.0 go-tpc
          tar -zcf go-tpc_latest_darwin_amd64.tar.gz -C dist/go-tpc_darwin_amd64_v1 go-tpc
          tar -zcf go-tpc_latest_darwin_arm64.tar.gz -C dist/go-tpc_darwin_arm64_v8.0 go-tpc

      - name: Update latest release
        if: github.event.ref == 'refs/heads/master'
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --prerelease \
            --title "Latest Build (${{ github.sha }})" \
            --notes "Development build: \`${{ github.sha }}\`" \
            *.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}
